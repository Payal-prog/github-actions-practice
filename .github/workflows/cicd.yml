name: CICD

on:
  workflow_dispatch:

jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        run: echo "Cloning code"
  build:
    needs: [code]
    runs-on: ubuntu-latest
    steps:
      - name: Build using Docker
        run: echo "Building using docker"
  test:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Run test cases
        run: echo "Run test cases"

  deploy:
    needs: [build,test]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy code
        run: echo "Deploy code"
